<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Buddy - Smart Planner</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --col-todo: #eff6ff;
            --col-doing: #fef9c3;
            --col-done: #f0fdf4;
        }

        .planner-page {
            padding: 2.5rem 3rem;
            flex: 1;
            overflow-y: auto;
        }

        .planner-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .planner-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .planner-header p {
            color: var(--text-muted);
            margin-top: 0.3rem;
            font-size: 1rem;
        }

        .add-task-bar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .add-task-bar input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            background: var(--card-bg);
            color: var(--text-main);
            transition: border 0.2s, box-shadow 0.2s;
        }

        .add-task-bar input:focus {
            border-color: #2b6cb0;
            box-shadow: 0 0 0 4px rgba(43, 108, 176, 0.1);
        }

        .add-task-bar select {
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            background: var(--card-bg);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        .add-task-bar button {
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            border: none;
            background: #2b6cb0;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .add-task-bar button:hover {
            background: #1e4a84;
        }

        /* Kanban Columns */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .kanban-col {
            border-radius: 20px;
            padding: 1.5rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .kanban-col.todo {
            background: var(--col-todo);
            border: 1.5px solid #bfdbfe;
        }

        .kanban-col.doing {
            background: var(--col-doing);
            border: 1.5px solid #fde68a;
        }

        .kanban-col.done {
            background: var(--col-done);
            border: 1.5px solid #bbf7d0;
        }

        .col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .col-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .col-count {
            border-radius: 50px;
            padding: 0.15rem 0.65rem;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .todo .col-count {
            background: #bfdbfe;
            color: #1e40af;
        }

        .doing .col-count {
            background: #fde68a;
            color: #92400e;
        }

        .done .col-count {
            background: #bbf7d0;
            color: #065f46;
        }

        .task-card {
            background: white;
            border-radius: 14px;
            padding: 1rem 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            cursor: grab;
            border-left: 4px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }

        .task-card.priority-high {
            border-left-color: #ef4444;
        }

        .task-card.priority-medium {
            border-left-color: #f59e0b;
        }

        .task-card.priority-low {
            border-left-color: #10b981;
        }

        .task-card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .task-card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .priority-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.15rem 0.55rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-high {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-low {
            background: #d1fae5;
            color: #065f46;
        }

        .task-actions-mini {
            display: flex;
            gap: 0.4rem;
        }

        .task-actions-mini button {
            border: none;
            background: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 2px 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }

        .task-actions-mini button:hover {
            color: #2b6cb0;
            background: #eff6ff;
        }

        .task-actions-mini button.promote {
            color: #10b981;
        }

        .task-actions-mini button.promote:hover {
            background: #d1fae5;
        }

        .task-actions-mini button.trash:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .empty-col {
            text-align: center;
            padding: 2rem 1rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .empty-col i {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.4;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <img src="/static/img/cloud-logo.png" alt="Logo" class="brand-logo-img">
                <span>Cloud Buddy</span>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/dashboard" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Overview</a>
                <a href="/progress" class="nav-item"><i class="fa-solid fa-chart-line"></i> Progress</a>
                <a href="/planner" class="nav-item active"><i class="fa-solid fa-list-check"></i> Planner</a>
                <a href="/goals" class="nav-item"><i class="fa-solid fa-bullseye"></i> Long-Term Goals</a>
                <a href="/logout" class="nav-item text-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </nav>
            <div class="sidebar-bottom">
                <div class="user-profile mt-3">
                    <img src="https://ui-avatars.com/api/?name=Cloud+Buddy&background=2b6cb0&color=fff" alt="User">
                    <div class="user-info"><strong>Smart Planner</strong><span>Kanban Board</span></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="planner-page">
                <div class="planner-header">
                    <div>
                        <h1><i class="fa-solid fa-list-check" style="color:#2b6cb0;"></i> Smart Planner</h1>
                        <p>Drag tasks across columns to track your workflow.</p>
                    </div>
                    <div id="date-display" style="color:var(--text-muted); font-weight:600;"></div>
                </div>

                <!-- Add Task Bar -->
                <form class="add-task-bar" id="planner-form">
                    <input type="text" id="planner-input" placeholder="Add a new task..." required>
                    <select id="priority-select">
                        <option value="low">🟢 Low Priority</option>
                        <option value="medium" selected>🟡 Medium Priority</option>
                        <option value="high">🔴 High Priority</option>
                    </select>
                    <button type="submit"><i class="fa-solid fa-plus"></i> Add Task</button>
                </form>

                <!-- Kanban Board -->
                <div class="kanban-board">
                    <div class="kanban-col todo" id="col-todo">
                        <div class="col-header">
                            <span class="col-title"><i class="fa-solid fa-inbox" style="color:#3b82f6;"></i> To
                                Do</span>
                            <span class="col-count" id="count-todo">0</span>
                        </div>
                        <div class="col-cards" id="cards-todo"></div>
                    </div>
                    <div class="kanban-col doing" id="col-doing">
                        <div class="col-header">
                            <span class="col-title"><i class="fa-solid fa-spinner" style="color:#eab308;"></i> In
                                Progress</span>
                            <span class="col-count" id="count-doing">0</span>
                        </div>
                        <div class="col-cards" id="cards-doing"></div>
                    </div>
                    <div class="kanban-col done" id="col-done">
                        <div class="col-header">
                            <span class="col-title"><i class="fa-solid fa-circle-check" style="color:#10b981;"></i>
                                Done</span>
                            <span class="col-count" id="count-done">0</span>
                        </div>
                        <div class="col-cards" id="cards-done"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Show date
        document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Local storage backed kanban
        let board = JSON.parse(localStorage.getItem('cloudbuddy_board') || '{"todo":[],"doing":[],"done":[]}');

        function saveBoard() { localStorage.setItem('cloudbuddy_board', JSON.stringify(board)); }

        function renderBoard() {
            ['todo', 'doing', 'done'].forEach(col => {
                const container = document.getElementById(`cards-${col}`);
                const count = document.getElementById(`count-${col}`);
                container.innerHTML = '';
                count.textContent = board[col].length;

                if (board[col].length === 0) {
                    container.innerHTML = `<div class="empty-col"><i class="fa-solid fa-clipboard"></i> No tasks yet</div>`;
                    return;
                }

                board[col].forEach((task, idx) => {
                    const badge = `badge-${task.priority}`;
                    const nextCol = col === 'todo' ? 'doing' : col === 'doing' ? 'done' : null;
                    const prevCol = col === 'done' ? 'doing' : col === 'doing' ? 'todo' : null;

                    const card = document.createElement('div');
                    card.className = `task-card priority-${task.priority}`;
                    card.innerHTML = `
                <div class="task-card-title">${task.title}</div>
                <div class="task-card-meta">
                    <span class="priority-badge ${badge}">${task.priority}</span>
                    <div class="task-actions-mini">
                        ${prevCol ? `<button title="Move back" onclick="moveTask('${col}',${idx},'${prevCol}')"><i class="fa-solid fa-arrow-left"></i></button>` : ''}
                        ${nextCol ? `<button class="promote" title="Move forward" onclick="moveTask('${col}',${idx},'${nextCol}')"><i class="fa-solid fa-arrow-right"></i></button>` : ''}
                        <button class="trash" title="Delete" onclick="deleteTask('${col}',${idx})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
                    container.appendChild(card);
                });
            });
        }

        window.moveTask = (fromCol, idx, toCol) => {
            const task = board[fromCol].splice(idx, 1)[0];
            board[toCol].push(task);
            // If moved to done, also sync with backend
            if (toCol === 'done') {
                fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: task.title }) })
                    .then(r => r.json()).then(t => fetch(`/api/tasks/${t.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ completed: true }) })).catch(() => { });
            }
            saveBoard(); renderBoard();
        };

        window.deleteTask = (col, idx) => {
            if (!confirm('Delete this task?')) return;
            board[col].splice(idx, 1);
            saveBoard(); renderBoard();
        };

        document.getElementById('planner-form').addEventListener('submit', e => {
            e.preventDefault();
            const title = document.getElementById('planner-input').value.trim();
            const priority = document.getElementById('priority-select').value;
            if (!title) return;
            board.todo.push({ title, priority });
            saveBoard(); renderBoard();
            document.getElementById('planner-input').value = '';
        });

        renderBoard();
    </script>
</body>

</html>
