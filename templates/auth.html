<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Buddy - Authentication</title>
    <!-- Use standard static links relative to the root for Flask -->
    <link rel="stylesheet" href="/static/css/auth.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">
                    <img src="/static/img/cloud-logo.png" alt="Cloud Logo" class="brand-logo-img">
                    <span>Cloud Buddy</span>
                </div>
                <h1 id="auth-title">Welcome Back</h1>
                <p id="auth-subtitle">Continue your journey to peak productivity.</p>
            </div>

            <div class="auth-toggle">
                <button id="login-toggle" class="active">Login</button>
                <button id="signup-toggle">Sign Up</button>
            </div>

            <form id="auth-form">
                <div class="form-group" id="name-group" style="display: none;">
                    <label for="name">Username</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="name" placeholder="john_doe_99">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="submit-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>AUTHENTICATION</span>
            </div>

            <p class="auth-footer">
                <span id="switch-text">Don't have an account?</span>
                <a href="#" id="auth-switch">Create one</a>
            </p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>

</html>
